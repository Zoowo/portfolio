<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("show");
      }
    });
  });

  document.querySelectorAll(".card, .section, .hero").forEach(el => {
    el.classList.add("hidden");
    observer.observe(el);
  });
</script>
